# Configuración del Extractor de Requerimientos
# Copia este archivo como config.yaml y ajusta los valores

# Carpeta de entrada (donde colocas tus documentos)
input_dir: "input"

# Carpeta de salida
output_dir: "output"

# --- Extracción de Video ---
video:
  # Intervalo entre frames extraídos (segundos)
  frame_interval: 15
  # Modelo Whisper para transcripción de audio: tiny|base|small|medium|large-v3
  whisper_model: "medium"
  # Idioma del audio (es=español, en=inglés, auto=detectar)
  language: "es"
  # Transcribir audio además de extraer frames
  transcribe_audio: true

# --- Análisis LLM ---
analysis:
  # Proveedor: "anthropic" (API) o "none" (solo consolida, sin análisis LLM)
  provider: "anthropic"
  # Modelo de Claude a usar
  model: "claude-sonnet-4-20250514"
  # API key (también puedes usar la variable de entorno ANTHROPIC_API_KEY)
  api_key: ""
  # Tokens máximos para la respuesta
  max_tokens: 16000

# --- Salida ---
output:
  # Formatos de salida: markdown, docx, ambos
  formats:
    - "markdown"
    - "docx"

# --- Branding (para documento de alcance) ---
branding:
  # Color primario de la empresa (hex)
  primary_color: "#C41E2A"
  # Color secundario (hex)
  secondary_color: "#1A1A1A"
  # Nombre de la empresa (auto-detectado del analisis si esta vacio)
  company_name: ""
  # Subtitulo de la empresa
  company_subtitle: ""
  # Nombre del autor del documento
  prepared_by: ""

# --- Documento de Alcance para Stakeholders ---
scope:
  # Habilitar/deshabilitar generacion del documento de alcance
  enabled: true
  # Modelo de Claude para generar la especificacion del alcance
  model: "claude-sonnet-4-20250514"
  # Tokens maximos para la respuesta
  max_tokens: 16000
